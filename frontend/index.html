<!DOCTYPE html>
<html>
<head>
  <title>Minha Cozinha</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-4">🍳 Minha Cozinha</h1>
    
    <!-- Upload da nota -->
    <input type="file" id="notaInput" accept=".pdf,.jpg,.png" class="mb-4">
    <button onclick="lerNota()" class="bg-blue-500 text-white p-2 rounded">Adicionar ao Estoque</button>
    
    <!-- Estoque atual -->
    <div id="estoque" class="mt-4 p-2 bg-white rounded shadow"></div>
    
    <!-- Sugestões -->
    <button onclick="buscarReceitas()" class="bg-green-500 text-white p-2 rounded mt-4">O que posso fazer?</button>
    <div id="receitas" class="mt-4"></div>
    
    <!-- Créditos ICMS -->
    <div class="mt-8 p-4 bg-yellow-100 rounded">
      <select id="estadoSelect" class="p-2 border rounded">
        <option value="SP">São Paulo</option>
        <option value="RJ">Rio de Janeiro</option>
      </select>
      <button onclick="redirecionarICMS()" class="bg-purple-500 text-white p-2 rounded ml-2">Ver meus créditos</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
